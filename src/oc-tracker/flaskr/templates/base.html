<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %} - OC Tracker</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-uppercase tracking-wider" href="{{ url_for('blog.index') }}">
        ✨ OC Tracker
      </a>
      
      <div class="ms-auto">
        <ul class="navbar-nav align-items-center">
          {% if g.user %}
            <li class="nav-item me-3 text-light opacity-75">
              Olá, <strong>{{ g.user['username'] }}</strong>
            </li>
            <li class="nav-item">
              <a class="btn btn-outline-danger btn-sm" href="{{ url_for('auth.logout') }}">Log Out</a>
            </li>
          {% else %}
            <li class="nav-item me-2">
              <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.login') }}">Log In</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-primary btn-sm" href="{{ url_for('auth.register') }}">Register</a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <header class="mb-4">
      {% block header %}{% endblock %}
    </header>

    {% for message in get_flashed_messages() %}
      <div class="alert alert-warning alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
