{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center h-100 flex-grow-1">
  <div class="col-12 d-flex flex-column">
    
    <div class="card shadow-sm border-0 h-100">
      <div class="card-body p-4 p-md-5 d-flex flex-column justify-content-center flex-grow-1">
        
        <h2 class="card-title text-center mb-4 fw-bold">Criar Conta</h2>
        
        <form method="post">
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Nome de Usuário</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="Escolha um username" required>
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Senha</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Crie uma senha segura" required>
          </div>
          
          <div class="d-grid mt-4">
            <input type="submit" value="Cadastrar" class="btn btn-primary py-2 fw-bold">
          </div>
        </form>
        
        <div class="text-center mt-4 small">
          Já tem uma conta? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color: #e29578;">Faça login</a>
        </div>
        
      </div>
    </div>
    
  </div>
</div>
{% endblock %}
